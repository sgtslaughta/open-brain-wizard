stages:
  - test
  - secret-detection
  - lint
  - security
  - build
  - publish
  - release

variables:
  IMAGE_NAME: ${CI_REGISTRY_IMAGE}/open-brain-installer
  DOCKER_TLS_CERTDIR: ""
  SECRET_DETECTION_ENABLED: 'true'

include:
- template: Security/SAST.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml

sast:
  stage: test

secret_detection:
  stage: secret-detection

# --- Lint & Format ---

lint:js:
  stage: lint
  image: node:iron-alpine
  script:
    - cd docker
    - npm install --omit=dev
    - npx --yes eslint --no-eslintrc --env node --env es2021 --parser-options=ecmaVersion:2021 server.js || true
  allow_failure: true

lint:dockerfile:
  stage: lint
  image: hadolint/hadolint:latest-alpine
  script:
    - hadolint docker/Dockerfile || true
  allow_failure: true

lint:shell:
  stage: lint
  image: koalaman/shellcheck-alpine:latest
  script:
    - shellcheck scripts/*.sh docker/entrypoint.sh || true
  allow_failure: true

# --- Security ---

security:trivy:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL --no-progress .
  allow_failure: true

security:secrets:
  stage: security
  image:
    name: trufflesecurity/trufflehog:latest
    entrypoint: [""]
  script:
    - trufflehog filesystem --no-update --fail . || true
  allow_failure: true

# --- Validate tag matches VERSION (tags only) ---

validate:version:
  stage: build
  image: alpine:latest
  script:
    - VERSION_FILE="$(cat VERSION | tr -d '[:space:]')"
    - TAG_NORM="${CI_COMMIT_TAG#v}"
    - |
      if [ "$VERSION_FILE" != "$TAG_NORM" ]; then
        echo "VERSION ($VERSION_FILE) does not match tag ($CI_COMMIT_TAG). Run ./scripts/bump-version.sh and commit before tagging."
        exit 1
      fi
    - 'PKG_VER="$(sed -n \"s/.*\"version\": *\"\\([^\"]*\\)\".*\/\\1\/p\" docker/package.json | tr -d \"[:space:]\")"'
    - |
      if [ -n "$PKG_VER" ] && [ "$PKG_VER" != "$VERSION_FILE" ]; then
        echo "docker/package.json version ($PKG_VER) does not match VERSION ($VERSION_FILE). Run ./scripts/bump-version.sh."
        exit 1
      fi
  rules:
    - if: $CI_COMMIT_TAG

# --- Build (tags only) ---

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - VERSION_NORM="${CI_COMMIT_TAG#v}"
    - docker build --build-arg VERSION="$VERSION_NORM" -f docker/Dockerfile -t "$IMAGE_NAME:${CI_COMMIT_TAG}" -t "$IMAGE_NAME:latest" .
    - docker save "$IMAGE_NAME:${CI_COMMIT_TAG}" > image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG

# --- Publish (tags only: push version tag + latest) ---

publish:
  stage: publish
  image: docker:latest
  services:
    - docker:dind
  dependencies:
    - build
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker load < image.tar
    - docker tag "$IMAGE_NAME:${CI_COMMIT_TAG}" "$IMAGE_NAME:latest"
    - docker push "$IMAGE_NAME:${CI_COMMIT_TAG}"
    - docker push "$IMAGE_NAME:latest"
  rules:
    - if: $CI_COMMIT_TAG

# --- Prepare release notes from CHANGELOG (tags only) ---

prepare:release_notes:
  stage: release
  image: alpine:latest
  script:
    - apk add --no-cache bash
    - chmod +x scripts/release-changelog.sh
    - sh scripts/release-changelog.sh "$CI_COMMIT_TAG" > release_notes.md || echo "Release $CI_COMMIT_TAG" > release_notes.md
    - cat release_notes.md
  artifacts:
    paths:
      - release_notes.md
  rules:
    - if: $CI_COMMIT_TAG

# --- Create GitLab release on tags ---

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  dependencies:
    - prepare:release_notes
  rules:
    - if: $CI_COMMIT_TAG
  release:
    tag_name: $CI_COMMIT_TAG
    description: release_notes.md
