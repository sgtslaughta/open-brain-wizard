name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/open-brain-installer

jobs:
  # --- Lint ---

  lint-js:
    name: Lint JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd docker && npm install --omit=dev
      - run: cd docker && npx --yes eslint@8 --no-eslintrc --env node --env es2021 --parser-options=ecmaVersion:2021 server.js
        continue-on-error: true

  lint-dockerfile:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
        continue-on-error: true

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck scripts/*.sh docker/entrypoint.sh
        continue-on-error: true

  # --- Security ---

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "0"

  trufflehog:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true

  # --- Build & Publish (tags only) ---

  validate-version:
    name: Validate Version
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check VERSION matches tag
        run: |
          VERSION_FILE="$(tr -d '[:space:]' < VERSION)"
          TAG_NORM="${GITHUB_REF_NAME#v}"
          if [ "$VERSION_FILE" != "$TAG_NORM" ]; then
            echo "VERSION ($VERSION_FILE) does not match tag ($GITHUB_REF_NAME). Run ./scripts/bump-version.sh and commit before tagging."
            exit 1
          fi
          PKG_VER="$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' docker/package.json | tr -d '[:space:]')"
          if [ -n "$PKG_VER" ] && [ "$PKG_VER" != "$VERSION_FILE" ]; then
            echo "docker/package.json version ($PKG_VER) does not match VERSION ($VERSION_FILE)."
            exit 1
          fi

  build-and-publish:
    name: Build & Publish
    if: startsWith(github.ref, 'refs/tags/')
    needs: [lint-js, lint-dockerfile, lint-shell, trivy, trufflehog, validate-version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          VERSION_NORM="${GITHUB_REF_NAME#v}"
          docker build --build-arg VERSION="$VERSION_NORM" \
            -f docker/Dockerfile \
            -t "$IMAGE_NAME:${GITHUB_REF_NAME}" \
            -t "$IMAGE_NAME:latest" .
          docker push "$IMAGE_NAME:${GITHUB_REF_NAME}"
          docker push "$IMAGE_NAME:latest"

  # --- Release (tags only) ---

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-and-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes
        run: |
          chmod +x scripts/release-changelog.sh
          bash scripts/release-changelog.sh "$GITHUB_REF_NAME" > release_notes.md || echo "Release $GITHUB_REF_NAME" > release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
